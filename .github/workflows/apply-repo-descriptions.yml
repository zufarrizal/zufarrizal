name: Apply Repository Descriptions

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (true/false)"
        required: true
        default: "true"

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply descriptions
        env:
          GITHUB_USERNAME: zufarrizal
          GH_REPO_ADMIN_TOKEN: ${{ secrets.GH_REPO_ADMIN_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python scripts/apply_repo_descriptions.py
